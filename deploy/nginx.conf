server {
    listen 80;
    server_name crm.aiym-syry.kg www.crm.aiym-syry.kg;
    # Редирект на HTTPS (certbot добавит автоматически)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name crm.aiym-syry.kg www.crm.aiym-syry.kg;

    # SSL — certbot заполнит автоматически
    # ssl_certificate     /etc/letsencrypt/live/crm.aiym-syry.kg/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/crm.aiym-syry.kg/privkey.pem;

    client_max_body_size 20M;

    # ── Статика Django ──────────────────────────────────────────────────────
    location /static/ {
        alias /var/www/fitness-crm/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Медиафайлы (чеки, фото) ─────────────────────────────────────────────
    location /media/ {
        alias /var/www/fitness-crm/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── API → Gunicorn ───────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://unix:/run/fitness-crm.sock;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
    }

    # ── SPA (React) — все остальные пути ────────────────────────────────────
    location / {
        root  /var/www/fitness-crm/frontend-spa/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-store";
    }
}
