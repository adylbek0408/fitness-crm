{% extends 'admin_panel/base.html' %}
{% block sidebar %}{% endblock %}
{% block content_wrapper_class %}ml-0{% endblock %}
{% block title %}Вход — Admin{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-screen">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8">
    <h1 class="text-2xl font-bold text-blue-600 mb-1">Fitness CRM</h1>
    <p class="text-gray-400 text-sm mb-6">Панель администратора</p>

    <div id="error-msg"
         class="hidden bg-red-50 text-red-600 text-sm rounded-xl p-3 mb-4"></div>

    <form id="login-form" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Логин</label>
        <input type="text" id="username" required
          class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm
                 focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Пароль</label>
        <input type="password" id="password" required
          class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm
                 focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>
      <button type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium
               py-3 rounded-xl text-sm transition">
        Войти
      </button>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  if (localStorage.getItem('access_token')) {
    window.location.href = '/admin-panel/dashboard/';
  }

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errEl = document.getElementById('error-msg');
    errEl.classList.add('hidden');

    const res = await fetch('/api/accounts/token/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
      }),
    });

    if (!res.ok) {
      errEl.textContent = 'Неверный логин или пароль';
      errEl.classList.remove('hidden');
      return;
    }

    const data = await res.json();
    if (data.role !== 'admin') {
      errEl.textContent = 'Доступ только для администраторов';
      errEl.classList.remove('hidden');
      return;
    }

    localStorage.setItem('access_token', data.access);
    localStorage.setItem('refresh_token', data.refresh);
    window.location.href = '/admin-panel/dashboard/';
  });
</script>
{% endblock %}
