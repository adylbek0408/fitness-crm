<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Fitness CRM Admin{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex">

  {% block sidebar %}
  <aside class="w-60 bg-white shadow-md min-h-screen flex flex-col fixed left-0 top-0">
    <div class="px-6 py-5 border-b">
      <h1 class="text-lg font-bold text-blue-600">Fitness CRM</h1>
      <p class="text-xs text-gray-400 mt-1">Панель администратора</p>
    </div>
    <nav class="flex-1 px-4 py-4 space-y-1">
      <a href="/admin-panel/dashboard/"
         class="flex items-center gap-3 px-3 py-2 rounded-xl text-sm text-gray-700
                hover:bg-blue-50 hover:text-blue-600 transition">
        📊 Дашборд
      </a>
      <a href="/admin-panel/groups/"
         class="flex items-center gap-3 px-3 py-2 rounded-xl text-sm text-gray-700
                hover:bg-blue-50 hover:text-blue-600 transition">
        🏃 Потоки
      </a>
      <a href="/admin-panel/trainers/"
         class="flex items-center gap-3 px-3 py-2 rounded-xl text-sm text-gray-700
                hover:bg-blue-50 hover:text-blue-600 transition">
        👤 Тренеры
      </a>
      <a href="/admin-panel/clients/"
         class="flex items-center gap-3 px-3 py-2 rounded-xl text-sm text-gray-700
                hover:bg-blue-50 hover:text-blue-600 transition">
        👥 Клиенты
      </a>
      <a href="/admin-panel/statistics/"
         class="flex items-center gap-3 px-3 py-2 rounded-xl text-sm text-gray-700
                hover:bg-blue-50 hover:text-blue-600 transition">
        📈 Статистика
      </a>
    </nav>
    <div class="px-4 py-4 border-t">
      <p id="admin-username" class="text-xs text-gray-500 mb-2"></p>
      <button onclick="logout()"
        class="w-full text-sm text-red-500 hover:text-red-700 text-left px-3 py-2
               rounded-xl hover:bg-red-50 transition">
        Выйти
      </button>
    </div>
  </aside>
  {% endblock %}

  <div class="{% block content_wrapper_class %}ml-60{% endblock %} flex-1 p-8">
    {% block content %}{% endblock %}
  </div>

  <script>
    const API = '/api';

    function getToken() { return localStorage.getItem('access_token'); }

    function authHeaders() {
      const token = getToken();
      const headers = { 'Content-Type': 'application/json' };
      if (token) headers['Authorization'] = 'Bearer ' + token;
      return headers;
    }

    function logout() {
      localStorage.clear();
      window.location.href = '/admin-panel/';
    }

    const isLoginPage = window.location.pathname === '/admin-panel/';
    const token = getToken();
    if (!token && !isLoginPage) {
      window.location.href = '/admin-panel/';
    }

    async function loadAdminUser() {
      try {
        const res = await fetch(`${API}/accounts/me/`, { headers: authHeaders() });
        if (res.status === 401) { logout(); return; }
        const data = await res.json();
        if (data.role !== 'admin') {
          alert('Доступ только для администраторов');
          logout();
          return;
        }
        const el = document.getElementById('admin-username');
        if (el) el.textContent = data.username;
      } catch(e) {}
    }
    if (token) {
      loadAdminUser();
    }
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
