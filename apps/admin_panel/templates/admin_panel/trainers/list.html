{% extends 'admin_panel/base.html' %}
{% block title %}Тренеры{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-6">
  <h2 class="text-2xl font-bold text-gray-800">Тренеры</h2>
  <a href="/admin-panel/trainers/add/"
     class="bg-blue-600 hover:bg-blue-700 text-white text-sm px-5 py-2.5 rounded-xl">
    + Новый тренер
  </a>
</div>

<div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
  <table class="w-full text-sm">
    <thead class="bg-gray-50 border-b">
      <tr>
        <th class="text-left px-5 py-3 font-medium text-gray-600">ФИО</th>
        <th class="text-left px-5 py-3 font-medium text-gray-600">Телефон</th>
        <th class="text-left px-5 py-3 font-medium text-gray-600">Расписание</th>
        <th class="text-left px-5 py-3 font-medium text-gray-600">Потоки</th>
        <th class="px-5 py-3"></th>
      </tr>
    </thead>
    <tbody id="trainers-table">
      <tr><td colspan="5" class="text-center py-10 text-gray-400">Загрузка...</td></tr>
    </tbody>
  </table>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadTrainers() {
  const res = await fetch(`${API}/trainers/?page_size=100`, {
    headers: authHeaders()
  });
  if (res.status === 401) { logout(); return; }
  const data = await res.json();
  const tbody = document.getElementById('trainers-table');

  if (!(data.results || []).length) {
    tbody.innerHTML =
      '<tr><td colspan="5" class="text-center py-10 text-gray-400">Нет тренеров</td></tr>';
    return;
  }

  tbody.innerHTML = data.results.map(t => `
    <tr class="border-b hover:bg-gray-50 transition">
      <td class="px-5 py-4 font-medium text-gray-800">${t.full_name}</td>
      <td class="px-5 py-4 text-gray-600">${t.phone || '—'}</td>
      <td class="px-5 py-4 text-gray-500 max-w-xs truncate">${t.schedule || '—'}</td>
      <td class="px-5 py-4">
        <a href="/admin-panel/groups/?trainer=${t.id}"
           class="text-blue-500 hover:underline text-xs">
          Смотреть потоки
        </a>
      </td>
      <td class="px-5 py-4">
        <a href="/admin-panel/trainers/${t.id}/"
           class="text-blue-500 hover:text-blue-700 text-xs font-medium mr-3">
          Изменить
        </a>
        <button onclick="deactivateTrainer('${t.id}', '${t.full_name}')"
          class="text-red-400 hover:text-red-600 text-xs font-medium">
          Деактивировать
        </button>
      </td>
    </tr>
  `).join('');
}

async function deactivateTrainer(id, name) {
  if (!confirm(`Деактивировать тренера ${name}?`)) return;
  const res = await fetch(`${API}/trainers/${id}/`, {
    method: 'DELETE', headers: authHeaders()
  });
  if (res.ok || res.status === 204) loadTrainers();
  else {
    const d = await res.json();
    alert(d.detail || 'Ошибка');
  }
}

loadTrainers();
</script>
{% endblock %}
