{% extends 'admin_panel/base.html' %}
{% block title %}Поток{% endblock %}

{% block content %}
<div class="flex items-center gap-3 mb-6">
  <a href="/admin-panel/groups/" class="text-gray-400 hover:text-gray-600 text-sm">
    ← Назад
  </a>
  <h2 id="form-title" class="text-2xl font-bold text-gray-800">Новый поток</h2>
</div>

<div id="error-msg"
     class="hidden bg-red-50 text-red-600 rounded-xl p-4 mb-4 text-sm"></div>
<div id="success-msg"
     class="hidden bg-green-50 text-green-700 rounded-xl p-4 mb-4 text-sm"></div>

<div class="bg-white rounded-2xl shadow-sm border p-6 max-w-2xl">
  <form id="group-form" class="space-y-4">

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Номер потока *
        </label>
        <input type="number" name="number" required
          class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm
                 focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Тип группы *
        </label>
        <select name="group_type" required
          class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm
                 focus:outline-none focus:ring-2 focus:ring-blue-400">
          <option value="">Выберите тип</option>
          <option value="1.5h">1.5 часа</option>
          <option value="2.5h">2.5 часа</option>
        </select>
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Тренер *</label>
      <select name="trainer" id="trainer-select" required
        class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm
               focus:outline-none focus:ring-2 focus:ring-blue-400">
        <option value="">Выберите тренера</option>
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">
        График занятий
      </label>
      <textarea name="schedule" rows="3" placeholder="Пример: Пн, Ср, Пт 10:00-11:30"
        class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm
               focus:outline-none focus:ring-2 focus:ring-blue-400 resize-none"></textarea>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Дата старта *</label>
        <input type="date" name="start_date" required
          class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm
                 focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Дата окончания
        </label>
        <input type="date" name="end_date"
          class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm
                 focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Статус</label>
      <select name="status"
        class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm
               focus:outline-none focus:ring-2 focus:ring-blue-400">
        <option value="recruitment">Набор</option>
        <option value="active">Активный</option>
        <option value="completed">Завершён</option>
      </select>
    </div>

    <div class="flex gap-3 pt-2">
      <button type="submit"
        class="bg-blue-600 hover:bg-blue-700 text-white font-medium
               px-6 py-3 rounded-xl text-sm transition">
        Сохранить
      </button>
      <a href="/admin-panel/groups/"
         class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium
                px-6 py-3 rounded-xl text-sm transition">
        Отмена
      </a>
    </div>
  </form>
</div>
{% endblock %}

{% block scripts %}
<script>
const pathParts = window.location.pathname.split('/').filter(Boolean);
const groupId = pathParts[pathParts.length - 1];
const isEdit = groupId !== 'add';

async function loadTrainers() {
  const res = await fetch(`${API}/trainers/?page_size=100`, {
    headers: authHeaders()
  });
  const data = await res.json();
  const sel = document.getElementById('trainer-select');
  (data.results || []).forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.id;
    opt.textContent = t.full_name;
    sel.appendChild(opt);
  });
}

async function loadGroup() {
  if (!isEdit) return;
  document.getElementById('form-title').textContent = 'Редактировать поток';
  const res = await fetch(`${API}/groups/${groupId}/`, {
    headers: authHeaders()
  });
  if (!res.ok) return;
  const g = await res.json();

  const form = document.getElementById('group-form');
  form.number.value = g.number;
  form.group_type.value = g.group_type;
  form.schedule.value = g.schedule || '';
  form.start_date.value = g.start_date || '';
  form.end_date.value = g.end_date || '';
  form.status.value = g.status;

  setTimeout(() => {
    if (g.trainer) form.trainer.value = g.trainer.id;
  }, 300);
}

document.getElementById('group-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('error-msg');
  const sucEl = document.getElementById('success-msg');
  errEl.classList.add('hidden');
  sucEl.classList.add('hidden');

  const fd = new FormData(e.target);
  const body = {
    number: parseInt(fd.get('number')),
    group_type: fd.get('group_type'),
    trainer: fd.get('trainer'),
    schedule: fd.get('schedule'),
    start_date: fd.get('start_date'),
    end_date: fd.get('end_date') || null,
    status: fd.get('status'),
  };

  const url = isEdit
    ? `${API}/groups/${groupId}/`
    : `${API}/groups/`;
  const method = isEdit ? 'PUT' : 'POST';

  const res = await fetch(url, {
    method,
    headers: authHeaders(),
    body: JSON.stringify(body),
  });

  if (!res.ok) {
    const data = await res.json();
    const msg = typeof data === 'object'
      ? Object.entries(data).map(([k,v]) => `${k}: ${v}`).join('\n')
      : data.detail;
    errEl.textContent = msg;
    errEl.classList.remove('hidden');
    return;
  }

  sucEl.textContent = isEdit ? 'Поток обновлён!' : 'Поток создан!';
  sucEl.classList.remove('hidden');
  setTimeout(() => window.location.href = '/admin-panel/groups/', 1200);
});

loadTrainers().then(loadGroup);
</script>
{% endblock %}
