{% extends 'admin_panel/base.html' %}
{% block title %}Потоки{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-6">
  <h2 class="text-2xl font-bold text-gray-800">Потоки</h2>
  <a href="/admin-panel/groups/add/"
     class="bg-blue-600 hover:bg-blue-700 text-white text-sm px-5 py-2.5
            rounded-xl transition">
    + Новый поток
  </a>
</div>

<div class="bg-white rounded-2xl p-4 shadow-sm border mb-5 flex gap-3 flex-wrap">
  <select id="status-filter"
    class="border border-gray-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
    <option value="">Все статусы</option>
    <option value="recruitment">Набор</option>
    <option value="active">Активные</option>
    <option value="completed">Завершённые</option>
  </select>
  <select id="trainer-filter"
    class="border border-gray-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
    <option value="">Все тренеры</option>
  </select>
</div>

<div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
  <table class="w-full text-sm">
    <thead class="bg-gray-50 border-b">
      <tr>
        <th class="text-left px-5 py-3 font-medium text-gray-600">Поток</th>
        <th class="text-left px-5 py-3 font-medium text-gray-600">Тип</th>
        <th class="text-left px-5 py-3 font-medium text-gray-600">Тренер</th>
        <th class="text-left px-5 py-3 font-medium text-gray-600">График</th>
        <th class="text-left px-5 py-3 font-medium text-gray-600">Старт</th>
        <th class="text-left px-5 py-3 font-medium text-gray-600">Клиенты</th>
        <th class="text-left px-5 py-3 font-medium text-gray-600">Статус</th>
        <th class="px-5 py-3"></th>
      </tr>
    </thead>
    <tbody id="groups-table">
      <tr><td colspan="8" class="text-center py-10 text-gray-400">Загрузка...</td></tr>
    </tbody>
  </table>
</div>
{% endblock %}

{% block scripts %}
<script>
const statusBadge = {
  recruitment: 'bg-yellow-100 text-yellow-700',
  active: 'bg-green-100 text-green-700',
  completed: 'bg-gray-100 text-gray-500',
};
const statusLabel = {
  recruitment: 'Набор',
  active: 'Активный',
  completed: 'Завершён',
};

async function loadGroups() {
  const status = document.getElementById('status-filter').value;
  const trainer = document.getElementById('trainer-filter').value;
  const params = new URLSearchParams();
  if (status) params.append('status', status);
  if (trainer) params.append('trainer', trainer);

  const res = await fetch(`${API}/groups/?${params}&page_size=100`, {
    headers: authHeaders()
  });
  if (res.status === 401) { logout(); return; }
  const data = await res.json();
  const tbody = document.getElementById('groups-table');

  if (!(data.results || []).length) {
    tbody.innerHTML = '<tr><td colspan="8" class="text-center py-10 text-gray-400">Потоки не найдены</td></tr>';
    return;
  }

  tbody.innerHTML = data.results.map(g => `
    <tr class="border-b hover:bg-gray-50 transition">
      <td class="px-5 py-4 font-medium text-gray-800">Поток #${g.number}</td>
      <td class="px-5 py-4 text-gray-600">${g.group_type}</td>
      <td class="px-5 py-4 text-gray-600">${g.trainer?.full_name || '—'}</td>
      <td class="px-5 py-4 text-gray-500 max-w-xs truncate">${g.schedule || '—'}</td>
      <td class="px-5 py-4 text-gray-600">${g.start_date || '—'}</td>
      <td class="px-5 py-4 text-gray-600">${g.client_count}</td>
      <td class="px-5 py-4">
        <span class="px-2.5 py-1 rounded-full text-xs font-medium ${statusBadge[g.status]}">
          ${statusLabel[g.status]}
        </span>
      </td>
      <td class="px-5 py-4 flex gap-2">
        <a href="/admin-panel/groups/${g.id}/"
           class="text-blue-500 hover:text-blue-700 text-xs font-medium">
          Изменить
        </a>
        ${g.status !== 'completed' ? `
          <button onclick="closeGroup('${g.id}')"
            class="text-red-400 hover:text-red-600 text-xs font-medium">
            Закрыть
          </button>
        ` : ''}
      </td>
    </tr>
  `).join('');
}

async function closeGroup(id) {
  if (!confirm('Закрыть поток? Все активные клиенты станут \"Завершили\"')) return;
  const res = await fetch(`${API}/groups/${id}/close/`, {
    method: 'POST', headers: authHeaders()
  });
  if (res.ok) loadGroups();
  else alert('Ошибка при закрытии потока');
}

async function loadTrainers() {
  const res = await fetch(`${API}/trainers/?page_size=100`, {
    headers: authHeaders()
  });
  const data = await res.json();
  const sel = document.getElementById('trainer-filter');
  (data.results || []).forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.id;
    opt.textContent = t.full_name;
    sel.appendChild(opt);
  });

  const urlParams = new URLSearchParams(window.location.search);
  const trainerId = urlParams.get('trainer');
  if (trainerId) sel.value = trainerId;
}

document.getElementById('status-filter').addEventListener('change', loadGroups);
document.getElementById('trainer-filter').addEventListener('change', loadGroups);

loadTrainers().then(loadGroups);
</script>
{% endblock %}
