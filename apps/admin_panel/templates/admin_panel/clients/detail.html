{% extends 'admin_panel/base.html' %}
{% block title %}Клиент{% endblock %}

{% block content %}
<div class="flex items-center gap-3 mb-6">
  <a href="/admin-panel/clients/" class="text-gray-400 hover:text-gray-600 text-sm">
    ← Назад
  </a>
  <h2 class="text-2xl font-bold text-gray-800">Карточка клиента</h2>
</div>

<div id="error" class="hidden bg-red-50 text-red-600 rounded-2xl p-4 mb-4 text-sm"></div>

<div id="loading" class="text-center text-gray-400 py-12">Загрузка...</div>

<div id="content" class="hidden space-y-6">
  <div class="bg-white rounded-2xl p-6 shadow-sm border flex justify-between items-start">
    <div>
      <h3 id="client-name" class="text-xl font-bold text-gray-800"></h3>
      <p id="client-phone" class="text-sm text-gray-500 mt-1"></p>
      <p id="client-meta" class="text-xs text-gray-400 mt-1"></p>
    </div>
    <div class="flex items-center gap-3">
      <span id="client-status" class="text-xs px-3 py-1 rounded-full"></span>
      <select id="status-select"
        class="border border-gray-300 rounded-xl px-3 py-2 text-sm focus:outline-none">
        <option value="active">Активный</option>
        <option value="completed">Завершил</option>
        <option value="expelled">Отчислен</option>
      </select>
      <button id="status-btn"
        class="bg-blue-600 hover:bg-blue-700 text-white text-sm px-4 py-2 rounded-xl">
        Сменить
      </button>
    </div>
  </div>

  <div class="grid grid-cols-2 gap-5">
    <div class="bg-white rounded-2xl p-6 shadow-sm border">
      <h4 class="font-medium text-gray-700 mb-4">💳 Оплата</h4>
      <div id="payment-box" class="text-sm text-gray-600">—</div>
    </div>
    <div class="bg-white rounded-2xl p-6 shadow-sm border">
      <h4 class="font-medium text-gray-700 mb-4">🏷️ Дополнительно</h4>
      <div id="extra-box" class="text-sm text-gray-600 space-y-2"></div>
    </div>
  </div>

  <div class="bg-white rounded-2xl p-6 shadow-sm border">
    <div class="flex items-center justify-between mb-4">
      <h4 class="font-medium text-gray-700">🗓️ Посещаемость</h4>
      <a id="mobile-attendance-link" class="text-xs text-blue-600 hover:underline" href="#">
        Открыть в mobile →
      </a>
    </div>
    <div id="attendance-box" class="text-sm text-gray-600">Загрузка...</div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const pathParts = window.location.pathname.split('/').filter(Boolean);
const clientId = pathParts[pathParts.length - 1];

const statusStyles = {
  active: 'bg-green-100 text-green-700',
  completed: 'bg-gray-100 text-gray-500',
  expelled: 'bg-red-100 text-red-600',
};
const statusLabel = {
  active: 'Активный', completed: 'Завершил', expelled: 'Отчислен'
};

function fmtMoney(v) {
  return Number(v).toLocaleString('ru-RU') + ' сум';
}

async function loadClient() {
  const res = await fetch(`${API}/clients/${clientId}/`, { headers: authHeaders() });
  if (res.status === 401) { logout(); return; }
  if (!res.ok) {
    document.getElementById('loading').classList.add('hidden');
    const err = document.getElementById('error');
    err.textContent = 'Клиент не найден';
    err.classList.remove('hidden');
    return;
  }

  const c = await res.json();
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('content').classList.remove('hidden');

  document.getElementById('client-name').textContent = c.full_name;
  document.getElementById('client-phone').textContent = c.phone;
  document.getElementById('client-meta').textContent =
    `${c.training_format === 'online' ? '🌐 Онлайн' : '🏋️ Оффлайн'} · ${c.group_type}` +
    (c.group ? ` · Поток #${c.group.number}` : '') +
    (c.trainer ? ` · Тренер: ${c.trainer.full_name}` : '');

  const statusEl = document.getElementById('client-status');
  statusEl.textContent = statusLabel[c.status] || c.status;
  statusEl.className = `text-xs px-3 py-1 rounded-full ${statusStyles[c.status] || 'bg-gray-100 text-gray-500'}`;

  const select = document.getElementById('status-select');
  select.value = c.status;

  document.getElementById('mobile-attendance-link').href = `/mobile/clients/${c.id}/`;

  renderPayment(c);
  renderExtra(c);
  await loadAttendance(c);

  document.getElementById('status-btn').onclick = async () => {
    const newStatus = select.value;
    const res2 = await fetch(`${API}/clients/${clientId}/change_status/`, {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({ status: newStatus }),
    });
    if (res2.status === 401) { logout(); return; }
    if (!res2.ok) {
      const d = await res2.json();
      alert(d.detail || 'Ошибка');
      return;
    }
    window.location.reload();
  };
}

function renderExtra(c) {
  const box = document.getElementById('extra-box');
  box.innerHTML = `
    <div class="flex justify-between"><span class="text-gray-500">Повторный</span><span class="font-medium">${c.is_repeat ? 'Да' : 'Нет'}</span></div>
    <div class="flex justify-between"><span class="text-gray-500">Скидка</span><span class="font-medium">${Number(c.discount || 0)}%</span></div>
    <div class="flex justify-between"><span class="text-gray-500">Регистрация</span><span class="font-medium">${c.registered_at}</span></div>
  `;
}

function renderPayment(c) {
  const box = document.getElementById('payment-box');
  if (c.payment_type === 'full' && c.full_payment) {
    const p = c.full_payment;
    box.innerHTML = `
      <div class="space-y-2">
        <div class="flex justify-between"><span class="text-gray-500">Тип</span><span class="font-medium">Полная</span></div>
        <div class="flex justify-between"><span class="text-gray-500">Сумма</span><span class="font-medium">${fmtMoney(p.amount)}</span></div>
        <div class="flex justify-between"><span class="text-gray-500">Статус</span>
          <span class="${p.is_paid ? 'text-green-600' : 'text-red-500'} font-medium">
            ${p.is_paid ? '✅ Оплачено' : '⏳ Не оплачено'}
          </span>
        </div>
        ${p.receipt ? `<div><a href="${p.receipt}" target="_blank" class="text-blue-600 text-xs hover:underline">Открыть чек →</a></div>` : ''}
      </div>
    `;
    return;
  }
  if (c.payment_type === 'installment' && c.installment_plan) {
    const plan = c.installment_plan;
    box.innerHTML = `
      <div class="space-y-2">
        <div class="flex justify-between"><span class="text-gray-500">Тип</span><span class="font-medium">Рассрочка</span></div>
        <div class="flex justify-between"><span class="text-gray-500">Общая</span><span class="font-medium">${fmtMoney(plan.total_cost)}</span></div>
        <div class="flex justify-between"><span class="text-gray-500">Оплачено</span><span class="font-medium text-green-600">${fmtMoney(plan.total_paid)}</span></div>
        <div class="flex justify-between"><span class="text-gray-500">Остаток</span><span class="font-medium text-red-500">${fmtMoney(plan.remaining)}</span></div>
        <div class="flex justify-between"><span class="text-gray-500">Дедлайн</span><span class="font-medium">${plan.deadline}</span></div>
        <div class="flex justify-between"><span class="text-gray-500">Статус</span>
          <span class="${plan.is_closed ? 'text-green-600' : 'text-orange-500'} font-medium">
            ${plan.is_closed ? '✅ Закрыта' : '⏳ Частичная'}
          </span>
        </div>
      </div>
    `;
    return;
  }
  box.textContent = '—';
}

async function loadAttendance(c) {
  const box = document.getElementById('attendance-box');
  if (c.training_format !== 'offline') {
    box.innerHTML = '<div class="text-gray-400">Посещаемость доступна только для оффлайн</div>';
    return;
  }
  const res = await fetch(`${API}/clients/${clientId}/attendance/`, { headers: authHeaders() });
  if (res.status === 401) { logout(); return; }
  const data = await res.json();
  if (!Array.isArray(data) || data.length === 0) {
    box.innerHTML = '<div class="text-gray-400">Записей нет</div>';
    return;
  }
  box.innerHTML = `
    <div class="space-y-2">
      ${data.slice(0, 20).map(r => `
        <div class="flex justify-between border-b border-gray-50 pb-1">
          <span class="text-gray-500">${r.lesson_date}</span>
          <span class="${r.is_absent ? 'text-red-500' : 'text-green-600'} font-medium">
            ${r.is_absent ? 'НБ' : 'Был'}
          </span>
        </div>
      `).join('')}
    </div>
  `;
}

loadClient();
</script>
{% endblock %}
