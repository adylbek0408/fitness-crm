{% extends 'frontend/base.html' %}
{% block title %}Главная{% endblock %}

{% block content %}
<h2 class="text-xl font-bold text-gray-800 mb-6">Добро пожаловать</h2>

<div class="grid grid-cols-2 gap-4 mb-6">
  <a href="/mobile/clients/register/"
     class="bg-blue-600 text-white rounded-2xl p-5 flex flex-col items-center
            justify-center text-center shadow-sm hover:bg-blue-700 transition">
    <span class="text-3xl mb-2">➕</span>
    <span class="text-sm font-medium">Регистрация клиента</span>
  </a>
  <a href="/mobile/clients/"
     class="bg-white text-gray-700 rounded-2xl p-5 flex flex-col items-center
            justify-center text-center shadow-sm hover:bg-gray-50 transition border">
    <span class="text-3xl mb-2">👥</span>
    <span class="text-sm font-medium">База клиентов</span>
  </a>
</div>

<div id="user-info" class="bg-white rounded-2xl p-4 shadow-sm border">
  <p class="text-sm text-gray-500">Вы вошли как:</p>
  <p id="username-display" class="font-medium text-gray-800">...</p>
  <p id="role-display" class="text-xs text-blue-500 mt-1">...</p>
</div>
{% endblock %}

{% block scripts %}
<script>
  async function loadUserInfo() {
    try {
      const res = await fetch('/api/accounts/me/', {
        headers: authHeaders()
      });
      if (res.status === 401) { logout(); return; }
      const data = await res.json();
      document.getElementById('username-display').textContent = data.username;
      const roleMap = {
        'admin': 'Администратор',
        'registrar': 'Регистратор',
        'attendance_manager': 'Менеджер посещаемости'
      };
      document.getElementById('role-display').textContent =
        roleMap[data.role] || data.role;
    } catch(e) {}
  }
  loadUserInfo();
</script>
{% endblock %}
