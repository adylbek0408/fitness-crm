<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Fitness CRM{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  {% block nav %}
  <nav class="bg-white shadow-sm px-4 py-3 flex items-center justify-between sticky top-0 z-10">
    <span class="font-bold text-blue-600 text-lg">Fitness CRM</span>
    <div class="flex gap-3">
      <a href="/mobile/dashboard/" class="text-sm text-gray-600">Главная</a>
      <a href="/mobile/clients/" class="text-sm text-gray-600">Клиенты</a>
      <a href="/mobile/clients/register/" class="text-sm text-blue-600 font-medium">+ Регистрация</a>
      <button onclick="logout()" class="text-sm text-red-500">Выйти</button>
    </div>
  </nav>
  {% endblock %}

  <main class="max-w-lg mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>

  <script>
    const API = '/api';

    function getToken() {
      return localStorage.getItem('access_token');
    }

    function authHeaders() {
      return {
        'Authorization': 'Bearer ' + getToken(),
        'Content-Type': 'application/json',
      };
    }

    function logout() {
      localStorage.removeItem('access_token');
      localStorage.removeItem('refresh_token');
      window.location.href = '/mobile/';
    }

    if (!getToken() && !window.location.pathname.match(/^\/mobile\/?$/)) {
      window.location.href = '/mobile/';
    }
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
