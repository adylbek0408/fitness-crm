{% extends 'frontend/base.html' %}
{% block title %}Карточка клиента{% endblock %}

{% block content %}
<div id="loading" class="text-center text-gray-400 py-12">Загрузка...</div>
<div id="client-card" class="hidden space-y-4">

  <div class="bg-white rounded-2xl p-5 shadow-sm border">
    <div class="flex justify-between items-start">
      <div>
        <h2 id="client-name" class="text-xl font-bold text-gray-800"></h2>
        <p id="client-phone" class="text-sm text-gray-500 mt-1"></p>
        <p id="client-format" class="text-xs text-gray-400 mt-1"></p>
      </div>
      <span id="client-status" class="text-xs px-3 py-1 rounded-full"></span>
    </div>
  </div>

  <div id="payment-section" class="bg-white rounded-2xl p-5 shadow-sm border">
    <h3 class="font-medium text-gray-700 mb-3">💳 Оплата</h3>
    <div id="payment-info"></div>
  </div>

  <div id="add-payment-section"
       class="hidden bg-white rounded-2xl p-5 shadow-sm border">
    <h3 class="font-medium text-gray-700 mb-3">Добавить платёж</h3>
    <div id="add-payment-error"
         class="hidden bg-red-50 text-red-600 text-sm rounded-lg p-3 mb-3"></div>
    <form id="add-payment-form" class="space-y-3">
      <input type="number" id="pay-amount" placeholder="Сумма (сум) *" required
        class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
      <label class="block text-sm text-gray-600">Дата платежа *</label>
      <input type="date" id="pay-date" required
        class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
      <input type="text" id="pay-note" placeholder="Комментарий"
        class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
      <button type="submit"
        class="w-full bg-green-600 hover:bg-green-700 text-white font-medium py-3 rounded-xl text-sm">
        Добавить платёж
      </button>
    </form>
  </div>

  <div id="upload-receipt-section"
       class="hidden bg-white rounded-2xl p-5 shadow-sm border">
    <h3 class="font-medium text-gray-700 mb-3">📎 Загрузить чек</h3>
    <form id="upload-receipt-form" class="space-y-3" enctype="multipart/form-data">
      <input type="file" id="receipt-file" accept="image/*" required
        class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm">
      <button type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-xl text-sm">
        Загрузить чек
      </button>
    </form>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
const pathParts = window.location.pathname.split('/').filter(Boolean);
const clientId = pathParts[pathParts.length - 1];
let clientData = null;

const statusStyles = {
  active: 'bg-green-100 text-green-700',
  completed: 'bg-gray-100 text-gray-600',
  expelled: 'bg-red-100 text-red-600',
};
const statusLabels = {
  active: 'Активный', completed: 'Завершил', expelled: 'Отчислен'
};

async function loadClient() {
  const res = await fetch(`/api/clients/${clientId}/`, {
    headers: authHeaders()
  });
  if (res.status === 401) { logout(); return; }
  if (!res.ok) {
    document.getElementById('loading').textContent = 'Клиент не найден';
    return;
  }

  clientData = await res.json();
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('client-card').classList.remove('hidden');

  document.getElementById('client-name').textContent = clientData.full_name ||
    (clientData.last_name + ' ' + clientData.first_name);
  document.getElementById('client-phone').textContent = clientData.phone;
  document.getElementById('client-format').textContent =
    (clientData.training_format === 'online' ? '🌐 Онлайн' : '🏋️ Оффлайн') +
    ' · ' + clientData.group_type;

  const statusEl = document.getElementById('client-status');
  statusEl.textContent = statusLabels[clientData.status] || clientData.status;
  statusEl.className = 'text-xs px-3 py-1 rounded-full ' +
    (statusStyles[clientData.status] || 'bg-gray-100 text-gray-600');

  renderPaymentInfo();
}

function renderPaymentInfo() {
  const container = document.getElementById('payment-info');

  if (clientData.payment_type === 'full' && clientData.full_payment) {
    const p = clientData.full_payment;
    container.innerHTML = `
      <div class="space-y-2 text-sm">
        <div class="flex justify-between">
          <span class="text-gray-500">Сумма</span>
          <span class="font-medium">${Number(p.amount).toLocaleString()} сум</span>
        </div>
        <div class="flex justify-between">
          <span class="text-gray-500">Статус</span>
          <span class="${p.is_paid ? 'text-green-600' : 'text-red-500'} font-medium">
            ${p.is_paid ? '✅ Оплачено' : '⏳ Не оплачено'}
          </span>
        </div>
        ${p.receipt ? `<div><a href="${p.receipt}" target="_blank"
          class="text-blue-500 text-xs">Открыть чек →</a></div>` : ''}
      </div>
    `;
    if (!p.is_paid) {
      document.getElementById('upload-receipt-section')
        .classList.remove('hidden');
    }
  }

  if (clientData.payment_type === 'installment' && clientData.installment_plan) {
    const plan = clientData.installment_plan;
    const totalCost = Number(plan.total_cost);
    const totalPaid = Number(plan.total_paid);
    const pct = totalCost > 0
      ? Math.round((totalPaid / totalCost) * 100) : 0;

    container.innerHTML = `
      <div class="space-y-3 text-sm">
        <div class="flex justify-between">
          <span class="text-gray-500">Общая стоимость</span>
          <span class="font-medium">${totalCost.toLocaleString()} сум</span>
        </div>
        <div class="flex justify-between">
          <span class="text-gray-500">Оплачено</span>
          <span class="font-medium text-green-600">
            ${totalPaid.toLocaleString()} сум
          </span>
        </div>
        <div class="flex justify-between">
          <span class="text-gray-500">Остаток</span>
          <span class="font-medium text-red-500">
            ${Number(plan.remaining).toLocaleString()} сум
          </span>
        </div>
        <div class="w-full bg-gray-200 rounded-full h-2">
          <div class="bg-blue-500 h-2 rounded-full"
               style="width: ${Math.min(pct, 100)}%"></div>
        </div>
        <p class="text-xs text-gray-400 text-right">${pct}% оплачено</p>
        <div class="flex justify-between">
          <span class="text-gray-500">Дедлайн</span>
          <span>${plan.deadline}</span>
        </div>
        <div class="flex justify-between">
          <span class="text-gray-500">Статус</span>
          <span class="${plan.is_closed ? 'text-green-600' : 'text-orange-500'} font-medium">
            ${plan.is_closed ? '✅ Закрыта' : '⏳ Частичная'}
          </span>
        </div>
        ${(plan.payments || []).length > 0 ? `
          <div class="pt-2 border-t">
            <p class="text-gray-500 mb-2">История платежей:</p>
            ${plan.payments.map(pay => `
              <div class="flex justify-between text-xs py-1 border-b border-gray-50">
                <span>${pay.paid_at}</span>
                <span class="font-medium">${Number(pay.amount).toLocaleString()} сум</span>
              </div>
            `).join('')}
          </div>
        ` : ''}
      </div>
    `;

    if (!plan.is_closed) {
      document.getElementById('add-payment-section').classList.remove('hidden');
    }
  }
}

document.getElementById('add-payment-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('add-payment-error');
  errEl.classList.add('hidden');

  const formData = new FormData();
  formData.append('amount', document.getElementById('pay-amount').value);
  formData.append('paid_at', document.getElementById('pay-date').value);
  const note = document.getElementById('pay-note').value;
  if (note) formData.append('note', note);

  const res = await fetch(`/api/payments/installment/${clientId}/payments/`, {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + getToken() },
    body: formData,
  });

  if (!res.ok) {
    const data = await res.json();
    errEl.textContent = data.detail || 'Ошибка';
    errEl.classList.remove('hidden');
    return;
  }

  window.location.reload();
});

document.getElementById('upload-receipt-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const file = document.getElementById('receipt-file').files[0];
  if (!file) return;

  const formData = new FormData();
  formData.append('receipt', file);

  const res = await fetch(`/api/payments/full/${clientId}/receipt/`, {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + getToken() },
    body: formData,
  });

  if (res.ok) window.location.reload();
});

loadClient();
</script>
{% endblock %}
