{% extends 'frontend/base.html' %}
{% block nav %}{% endblock %}
{% block title %}Вход{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-screen -mt-6">
  <div class="w-full bg-white rounded-2xl shadow-md p-8">
    <h1 class="text-2xl font-bold text-center text-blue-600 mb-2">Fitness CRM</h1>
    <p class="text-center text-gray-500 text-sm mb-6">Вход для регистраторов</p>

    <div id="error-msg" class="hidden bg-red-50 text-red-600 text-sm rounded-lg p-3 mb-4"></div>

    <form id="login-form" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Логин</label>
        <input
          type="text" id="username" required
          class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm
                 focus:outline-none focus:ring-2 focus:ring-blue-400"
          placeholder="username"
        >
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Пароль</label>
        <input
          type="password" id="password" required
          class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm
                 focus:outline-none focus:ring-2 focus:ring-blue-400"
          placeholder="••••••••"
        >
      </div>
      <button
        type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium
               py-3 rounded-xl text-sm transition-colors"
      >
        Войти
      </button>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  if (localStorage.getItem('access_token')) {
    window.location.href = '/mobile/dashboard/';
  }

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorEl = document.getElementById('error-msg');
    errorEl.classList.add('hidden');

    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    try {
      const res = await fetch('/api/accounts/token/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });

      if (!res.ok) {
        const data = await res.json();
        errorEl.textContent = data.detail || 'Неверный логин или пароль';
        errorEl.classList.remove('hidden');
        return;
      }

      const data = await res.json();
      localStorage.setItem('access_token', data.access);
      localStorage.setItem('refresh_token', data.refresh);
      window.location.href = '/mobile/dashboard/';
    } catch (err) {
      errorEl.textContent = 'Ошибка соединения';
      errorEl.classList.remove('hidden');
    }
  });
</script>
{% endblock %}
